name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write private-config.js from secrets (Supabase only — no PINs)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          node <<'NODE'
          const fs = require("fs");
          const url = (process.env.SUPABASE_URL || "").trim();
          const key = (process.env.SUPABASE_ANON_KEY || "").trim();
          if (!url || !key) {
            console.error("Missing SUPABASE_URL or SUPABASE_ANON_KEY repository secrets.");
            process.exit(1);
          }
          const body =
            "window.SITE_PRIVATE = " +
            JSON.stringify({ supabaseUrl: url, supabaseAnonKey: key }, null, 2) +
            ";\n";
          fs.writeFileSync("js/private-config.js", body, "utf8");
          console.log("Wrote js/private-config.js (Supabase URL + key only; PINs stay in database)");
          NODE

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
